apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
  labels:
    app: nginx
spec: # of deployment
  replicas: 1
  selector:
    matchLabels:
    app: nginx
  template:
    metadata:
    labels:
      app: nginx
    spec: # of pod
      containers:
      - name: nginx
        image: nginx:1.16
        ports:
        - containerPort: 80
